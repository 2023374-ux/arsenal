<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mini Arsenal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{overflow:hidden;background:#0b0b0b}
canvas{display:block;background:linear-gradient(#1a1a1a,#050505)}
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
text-shadow:0 0 10px cyan;
z-index:10;
}
#crosshair{
position:absolute;
left:50%;
top:50%;
width:24px;
height:24px;
margin-left:-12px;
margin-top:-12px;
pointer-events:none;
z-index:20;
}
#crosshair::before,#crosshair::after{
content:'';
position:absolute;
background:white;
}
#crosshair::before{
width:24px;
height:2px;
top:11px;
}
#crosshair::after{
height:24px;
width:2px;
left:11px;
}
#menu{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.8);
color:white;
z-index:30;
}
button{
padding:14px 30px;
font-size:22px;
margin-top:20px;
border:none;
border-radius:12px;
background:cyan;
font-weight:bold;
cursor:pointer;
}
button:hover{background:white}
</style>
</head>
<body>

<div id="ui">
❤️ HP: <span id="hp">100</span><br>
🔫 Weapon: <span id="weapon">Pistol</span><br>
🏆 Kills: <span id="kills">0</span><br>
⭐ Level: <span id="level">1</span>
</div>

<div id="crosshair"></div>

<div id="menu">
<h1 style="font-size:70px;color:cyan">MINI ARSENAL</h1>
<p>WASD = Move | Hold Mouse = Shoot</p>
<button id="playBtn">PLAY</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = innerWidth;
canvas.height = innerHeight;

const hpUI = document.getElementById('hp');
const weaponUI = document.getElementById('weapon');
const killsUI = document.getElementById('kills');
const levelUI = document.getElementById('level');

let started = false;

const player = {
x:canvas.width/2,
y:canvas.height/2,
size:26,
speed:5,
hp:100,
weapon:'Pistol',
fireRate:14,
damage:20,
color:'cyan',
kills:0,
level:1
};

const weapons = [
{name:'Pistol',damage:20,fireRate:14,color:'white'},
{name:'SMG',damage:14,fireRate:5,color:'lime'},
{name:'Laser Rifle',damage:40,fireRate:7,color:'magenta'},
{name:'Golden Gun',damage:90,fireRate:16,color:'gold'},
{name:'Plasma Cannon',damage:140,fireRate:24,color:'orange'}
];

const keys = {};
const bullets = [];
const enemies = [];

let mouseX = canvas.width/2;
let mouseY = canvas.height/2;
let shooting = false;
let frame = 0;

addEventListener('keydown',e=>keys[e.key.toLowerCase()] = true);
addEventListener('keyup',e=>keys[e.key.toLowerCase()] = false);

addEventListener('mousemove',e=>{
mouseX = e.clientX;
mouseY = e.clientY;
});

addEventListener('mousedown',()=>shooting=true);
addEventListener('mouseup',()=>shooting=false);

playBtn.onclick = ()=>{
menu.style.display='none';
started = true;
}

class Bullet{
constructor(x,y,angle){
this.x=x;
this.y=y;
this.radius=5;
this.dx=Math.cos(angle)*15;
this.dy=Math.sin(angle)*15;
}
update(){
this.x += this.dx;
this.y += this.dy;
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
ctx.fillStyle = player.color;
ctx.shadowBlur = 20;
ctx.shadowColor = player.color;
ctx.fill();
}
}

class Enemy{
constructor(){
this.size = 30;
const side = Math.floor(Math.random()*4);

if(side===0){
this.x = 0;
this.y = Math.random()*canvas.height;
}else if(side===1){
this.x = canvas.width;
this.y = Math.random()*canvas.height;
}else if(side===2){
this.x = Math.random()*canvas.width;
this.y = 0;
}else{
this.x = Math.random()*canvas.width;
this.y = canvas.height;
}

this.hp = 40 + player.level*5;
this.speed = 1.8 + player.level*0.15;
}
update(){
const angle = Math.atan2(player.y-this.y,player.x-this.x);
this.x += Math.cos(angle)*this.speed;
this.y += Math.sin(angle)*this.speed;
}
draw(){
ctx.fillStyle='red';
ctx.shadowBlur=20;
ctx.shadowColor='red';
ctx.fillRect(this.x-this.size/2,this.y-this.size/2,this.size,this.size);
}
}

function spawnEnemy(){
enemies.push(new Enemy());
}

function move(){
if(keys['w']) player.y -= player.speed;
if(keys['s']) player.y += player.speed;
if(keys['a']) player.x -= player.speed;
if(keys['d']) player.x += player.speed;
}

function drawPlayer(){
ctx.save();
ctx.translate(player.x,player.y);
const angle = Math.atan2(mouseY-player.y,mouseX-player.x);
ctx.rotate(angle);
ctx.fillStyle = player.color;
ctx.shadowBlur = 20;
ctx.shadowColor = player.color;
ctx.fillRect(-14,-14,28,28);
ctx.fillRect(0,-5,35,10);
ctx.restore();
}

function shoot(){
const angle = Math.atan2(mouseY-player.y,mouseX-player.x);
bullets.push(new Bullet(player.x,player.y,angle));
}

function nextWeapon(){
player.level++;

const weapon = weapons[player.level % weapons.length];

player.weapon = weapon.name;
player.damage = weapon.damage + player.level * 5;
player.fireRate = Math.max(3, weapon.fireRate - Math.floor(player.level/3));
player.color = weapon.color;

player.speed += 0.15;
player.hp += 10;
}

function updateUI(){
hpUI.textContent = Math.floor(player.hp);
weaponUI.textContent = player.weapon;
killsUI.textContent = player.kills;
levelUI.textContent = player.level;
}

function loop(){
requestAnimationFrame(loop);
if(!started) return;

frame++;
ctx.clearRect(0,0,canvas.width,canvas.height);

move();
drawPlayer();

if(shooting && frame % player.fireRate === 0){
shoot();
}

bullets.forEach((bullet,bi)=>{
bullet.update();
bullet.draw();

enemies.forEach((enemy,ei)=>{
const dx = bullet.x-enemy.x;
const dy = bullet.y-enemy.y;
const dist = Math.hypot(dx,dy);

if(dist < enemy.size){
enemy.hp -= player.damage;
bullets.splice(bi,1);

if(enemy.hp <= 0){
enemies.splice(ei,1);
player.kills++;

if(player.kills % 5 === 0){
nextWeapon();
}
}
}
});
});

enemies.forEach(enemy=>{
enemy.update();
enemy.draw();

const dx = enemy.x-player.x;
const dy = enemy.y-player.y;
const dist = Math.hypot(dx,dy);

if(dist < enemy.size){
player.hp -= 0.3;
if(player.hp <= 0){
alert('GAME OVER');
location.reload();
}
}
});

if(frame % 60 === 0){
spawnEnemy();
}

updateUI();
}

loop();

onresize = ()=>{
canvas.width = innerWidth;
canvas.height = innerHeight;
}
</script>
</body>
</html>
